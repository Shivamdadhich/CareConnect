<!-- templates/receptionist_dashboard.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Receptionist Dashboard | CareConnect</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='receptionist_dashboard.css') }}">
  {% include 'theme_style.html' %}
</head>
<body class="bg-light">
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 shadow-sm">
      <div class="container-fluid px-4">
          <a class="navbar-brand fw-bold d-flex align-items-center" href="/">
              <span style="color: #10b981; margin-right: 6px; font-size: 1.25rem;">✚</span> CareConnect Receptionist Dashboard
          </a>
          <div class="ms-auto d-flex align-items-center gap-3">
              <span class="navbar-text text-light">Receptionist: <strong>{{ session.get('receptionist_name') }}</strong></span>
              <a href="{{ url_for('receptionist_logout') }}" class="btn btn-outline-danger btn-sm px-3">Logout</a>
          </div>
      </div>
  </nav>
  <div class="container mt-5">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="card p-4 shadow-sm">
          <h3 class="text-center mb-4">Search Patient by Aadhaar</h3>
          <form method="POST" action="/receptionist/search">
            <div class="mb-3">
              <label for="aadhaar" class="form-label">Aadhaar Number</label>
              <input type="text" name="aadhaar" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Search</button>
            <div class="text-center mt-3">
              <a href="/admin/login">&larr; Logout</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
