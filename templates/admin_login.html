<!-- templates/admin_login.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareConnect | Gateway</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    {% include 'theme_style.html' %}
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #f0fdf4;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }
        .gateway-card {
            background: #ffffff;
            border: 1px solid #d1fae5;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(4, 120, 87, 0.08);
            padding: 40px;
            width: 100%;
            max-width: 480px;
        }
        .gateway-title {
            font-weight: 700;
            color: #064e3b;
            text-align: center;
            margin-bottom: 8px;
        }
        .gateway-subtitle {
            color: #047857;
            text-align: center;
            font-size: 0.95rem;
            margin-bottom: 30px;
        }
        .role-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 24px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1.05rem;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid #a7f3d0;
            background: #f0fdf4;
            color: #064e3b !important;
            text-decoration: none;
        }
        .role-btn:hover {
            transform: translateY(-2px);
            background: #10b981;
            color: #ffffff !important;
            border-color: #10b981;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
        }
        .role-icon {
            font-size: 1.25rem;
        }
    </style>
</head>
<body>

    <div class="gateway-card shadow-lg">
        <div class="text-center mb-3">
            <span style="font-size: 2.5rem; color: #10b981; font-weight: bold; display: inline-block; transform: scale(1.2);">✚</span>
        </div>
        <h3 class="gateway-title">CareConnect</h3>
        <p class="gateway-subtitle">Select your role to access the staff gateway</p>

        <div class="d-grid gap-3">
            <a href="/receptionist/login" class="role-btn">
                <span>Receptionist Portal</span>
                <span class="role-icon">👤</span>
            </a>
            <a href="/doctor/login" class="role-btn">
                <span>Doctor Portal</span>
                <span class="role-icon">🥼</span>
            </a>
            <a href="/lab/login" class="role-btn">
                <span>Lab In-Charge Portal</span>
                <span class="role-icon">🔬</span>
            </a>
            <a href="/other/login" class="role-btn">
                <span>Other Staff Portal</span>
                <span class="role-icon">⚙️</span>
            </a>
            
            <a href="{{ url_for('home') }}" class="btn btn-outline-secondary w-100 py-3 mt-2" style="border-radius: 12px; font-weight: 600;">
                Back to Home
            </a>
        </div>
    </div>

</body>
</html>
