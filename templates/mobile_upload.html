<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Prescription | CareConnect</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;800&family=Plus+Jakarta+Sans:wght@500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #f0fdf4 0%, #ecfdf5 50%, #f6fffa 100%) !important;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .upload-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(16, 185, 129, 0.2);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(4, 120, 87, 0.08);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }
        h3 {
            font-family: 'Outfit', sans-serif;
            color: #064e3b;
            font-weight: 700;
        }
        .camera-icon {
            font-size: 3rem;
            color: #10b981;
            margin-bottom: 20px;
            display: inline-block;
            animation: bounce 2s infinite;
        }
        .glass-input {
            border: 1.5px solid rgba(16, 185, 129, 0.2);
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 0.95rem;
            background: rgba(255, 255, 255, 0.8);
            transition: all 0.3s ease;
            color: #064e3b;
            font-weight: 600;
        }
        .btn-action {
            border-radius: 12px;
            padding: 12px 28px;
            font-weight: 600;
            font-size: 1rem;
            box-shadow: 0 4px 14px rgba(16, 185, 129, 0.2);
            transition: all 0.3s ease;
        }
        .btn-action:hover {
            transform: translateY(-1px);
        }
        #previewContainer img {
            max-width: 100%;
            border-radius: 16px;
            border: 2px solid rgba(16, 185, 129, 0.2);
            margin-top: 15px;
            max-height: 250px;
            object-fit: cover;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
    </style>
</head>
<body>
    <div class="upload-card">
        <span class="camera-icon">📸</span>
        <h3 class="mb-3">Scan Prescription</h3>
        <p class="text-muted small mb-4">Click below to take a photo of the physical prescription receipt from your device camera.</p>
        
        <form action="/api/prescription/upload_mobile/{{ token }}" method="POST" enctype="multipart/form-data" onsubmit="showLoading()">
            <div class="mb-4">
                <input type="file" name="prescription_file" id="prescription_file" class="form-control glass-input" accept="image/*" capture="environment" required onchange="previewImage(event)">
            </div>
            
            <div id="previewContainer" class="mb-4" style="display: none;">
                <p class="data-label text-start mb-2 small fw-bold text-success">Captured Image Preview:</p>
                <img id="imagePreview" src="#" alt="Captured Image">
            </div>

            <button type="submit" id="submitBtn" class="btn btn-action btn-success w-100 justify-content-center">
                Upload & Sync Now ➔
            </button>
        </form>
    </div>

    <script>
        function previewImage(event) {
            const input = event.target;
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const previewImg = document.getElementById('imagePreview');
                    previewImg.src = e.target.result;
                    document.getElementById('previewContainer').style.display = 'block';
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        function showLoading() {
            const btn = document.getElementById("submitBtn");
            btn.disabled = true;
            btn.innerHTML = `
                <span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
                Syncing image...
            `;
        }
    </script>
</body>
</html>
