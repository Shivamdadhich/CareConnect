<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capture Prescription | CareConnect</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;700;800&family=Plus+Jakarta+Sans:wght@500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #090d16;
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
            margin: 0;
        }
        .capture-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(16, 185, 129, 0.25);
            border-radius: 28px;
            padding: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 480px;
            text-align: center;
        }
        h3 {
            font-family: 'Outfit', sans-serif;
            color: #34d399;
            font-weight: 700;
        }
        .video-preview-wrapper {
            position: relative;
            width: 100%;
            border-radius: 20px;
            overflow: hidden;
            background: #000;
            border: 2px solid rgba(52, 211, 153, 0.3);
            margin-bottom: 15px;
            aspect-ratio: 3/4;
        }
        #webcam {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .capture-trigger {
            background: #10b981;
            border: 6px solid rgba(16, 185, 129, 0.3);
            color: white;
            width: 76px;
            height: 76px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.4);
        }
        .capture-trigger:active {
            transform: scale(0.9);
            background: #059669;
        }
        .thumbnails-container {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 10px 5px;
            scrollbar-width: thin;
            justify-content: flex-start;
            min-height: 90px;
            border-radius: 12px;
            background: rgba(15, 23, 42, 0.5);
            margin-bottom: 15px;
            border: 1px dashed rgba(255, 255, 255, 0.1);
        }
        .thumb-wrapper {
            position: relative;
            flex: 0 0 70px;
            height: 70px;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid #34d399;
        }
        .thumb-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .thumb-badge {
            position: absolute;
            bottom: 2px;
            right: 2px;
            background: rgba(0,0,0,0.7);
            color: #34d399;
            font-size: 0.65rem;
            padding: 2px 4px;
            border-radius: 4px;
            font-weight: 700;
        }
        .thumb-delete {
            position: absolute;
            top: -2px;
            left: -2px;
            background: #ef4444;
            color: white;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            font-size: 0.65rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-weight: bold;
            border: 1px solid white;
        }
        .btn-action {
            border-radius: 14px;
            padding: 14px 28px;
            font-weight: 700;
            font-size: 1.05rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(16, 185, 129, 0.3);
        }
    </style>
</head>
<body>
    <div class="capture-card">
        <h3 class="mb-2">CareConnect Smart Scanner</h3>
        <p class="text-light-50 text-muted small mb-3">Position the receipt in the view and snap photos sequentially. Images will sync directly without saving to your device.</p>
        
        <div class="video-preview-wrapper">
            <video id="webcam" autoplay playsinline></video>
        </div>
        
        <div class="mb-3">
            <button type="button" class="capture-trigger" onclick="captureFrame()">📸</button>
        </div>
        
        <div class="text-start mb-1 small text-success fw-bold">Captured Pages Order:</div>
        <div class="thumbnails-container" id="thumbContainer">
            <div class="w-100 text-center text-muted small my-auto py-2" id="emptyPlaceholder">No pages captured yet.</div>
        </div>

        <button type="button" id="uploadBtn" class="btn btn-action btn-success w-100" style="display: none;" onclick="uploadAll()">
            Upload & Sync Pages ➔
        </button>
        
        <canvas id="captureCanvas" style="display: none;"></canvas>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('captureCanvas');
        const thumbContainer = document.getElementById('thumbContainer');
        const emptyPlaceholder = document.getElementById('emptyPlaceholder');
        const uploadBtn = document.getElementById('uploadBtn');
        
        let capturedBlobs = []; // Array of Blobs in chronological order

        // Initialize WebRTC back camera stream
        navigator.mediaDevices.getUserMedia({
            video: { facingMode: { exact: "environment" } },
            audio: false
        })
        .catch(err => {
            console.log("Back camera exact match failed, falling back to any environment camera.");
            return navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false });
        })
        .catch(err => {
            console.log("No environment camera found, falling back to default camera.");
            return navigator.mediaDevices.getUserMedia({ video: true, audio: false });
        })
        .then(stream => {
            video.srcObject = stream;
        })
        .catch(err => {
            console.error("Camera access error:", err);
            alert("Error accessing camera. Please ensure permissions are granted.");
        });

        function captureFrame() {
            if (!video.srcObject) return;
            
            // Set canvas size matching the video stream resolution
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            // Convert to blob and store
            canvas.toBlob((blob) => {
                capturedBlobs.push(blob);
                renderThumbnails();
            }, 'image/jpeg', 0.85);
        }

        function removeImage(index) {
            capturedBlobs.splice(index, 1);
            renderThumbnails();
        }

        function renderThumbnails() {
            // Clear all
            thumbContainer.innerHTML = '';
            
            if (capturedBlobs.length === 0) {
                thumbContainer.appendChild(emptyPlaceholder);
                uploadBtn.style.display = 'none';
                return;
            }
            
            capturedBlobs.forEach((blob, idx) => {
                const url = URL.createObjectURL(blob);
                const wrapper = document.createElement('div');
                wrapper.className = 'thumb-wrapper';
                
                const img = document.createElement('img');
                img.src = url;
                
                const deleteBtn = document.createElement('div');
                deleteBtn.className = 'thumb-delete';
                deleteBtn.innerHTML = '✕';
                deleteBtn.onclick = () => removeImage(idx);
                
                const badge = document.createElement('span');
                badge.className = 'thumb-badge';
                badge.innerHTML = `Page ${idx + 1}`;
                
                wrapper.appendChild(img);
                wrapper.appendChild(deleteBtn);
                wrapper.appendChild(badge);
                thumbContainer.appendChild(wrapper);
            });
            
            uploadBtn.style.display = 'block';
            uploadBtn.innerHTML = `Upload & Sync ${capturedBlobs.length} Page${capturedBlobs.length > 1 ? 's' : ''} ➔`;
        }

        function uploadAll() {
            if (capturedBlobs.length === 0) return;
            
            uploadBtn.disabled = true;
            uploadBtn.innerHTML = `
                <span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
                Syncing pages...
            `;
            
            const formData = new FormData();
            // Append files to FormData in the captured order
            capturedBlobs.forEach((blob, idx) => {
                formData.append('prescription_file', blob, `prescription_page_${idx + 1}.jpg`);
            });
            
            fetch("/api/prescription/upload_mobile/{{ token }}", {
                method: "POST",
                body: formData
            })
            .then(res => res.text())
            .then(html => {
                document.body.innerHTML = html;
            })
            .catch(err => {
                console.error("Upload error:", err);
                alert("Upload failed. Please try again.");
                renderThumbnails();
            });
        }
    </script>
</body>
</html>
